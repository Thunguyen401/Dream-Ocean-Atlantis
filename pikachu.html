<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Pikachu - Abyssara Edition</title>
    <style>
        body { background: #00050a; color: #00f2ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { border: 2px solid #00f2ff; background: #000; cursor: pointer; box-shadow: 0 0 20px rgba(0,242,255,0.3); }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: transparent; border: 1px solid #00f2ff; color: #00f2ff; cursor: pointer; text-decoration: none; border-radius: 5px; }
        .back-btn:hover { background: #00f2ff; color: #000; }
    </style>
</head>
<body>

    <h2>GIẢI MÃ CỔ VẬT</h2>
    <canvas id="pikaCanvas"></canvas>
    
    <!-- Nút quay lại trang chủ -->
    <a href="index.html" class="back-btn">← RỜI KHỎI VỰC THẨM</a>

    <script>
        const canvas = document.getElementById('pikaCanvas');
        const ctx = canvas.getContext('2d');
        const ROWS = 6, COLS = 8, TILE = 50;
        canvas.width = COLS * TILE; canvas.height = ROWS * TILE;

        let board = [], selected = null;
        const icons = ['A','B','C','D','E','F','G','H'];
        
        // Khởi tạo bảng
        let pool = [];
        for(let i=0; i<24; i++) { let ic = icons[i%8]; pool.push(ic, ic); }
        pool.sort(() => Math.random() - 0.5);
        for(let r=0; r<ROWS; r++) {
            board[r] = [];
            for(let c=0; c<COLS; c++) board[r][c] = pool.pop();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(!board[r][c]) continue;
                    ctx.strokeStyle = "#00f2ff";
                    ctx.strokeRect(c*TILE, r*TILE, TILE, TILE);
                    ctx.fillStyle = (selected && selected.r===r && selected.c===c) ? "#00f2ff" : "#fff";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText(board[r][c], c*TILE+18, r*TILE+32);
                }
            }
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) / TILE);
            const r = Math.floor((e.clientY - rect.top) / TILE);
            if(!board[r][c]) return;
            if(!selected) selected = {r,c};
            else {
                if(board[r][c] === board[selected.r][selected.c] && (r !== selected.r || c !== selected.c)) {
                    board[r][c] = null; board[selected.r][selected.c] = null;
                }
                selected = null;
            }
            draw();
        };
        draw();
    </script>
</body>
</html>
