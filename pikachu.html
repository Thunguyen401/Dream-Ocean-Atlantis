<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Pikachu Atlantis</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#001a2c,#00050a);
color:#00f2ff;
font-family:Segoe UI;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

canvas{
border:2px solid #00f2ff;
box-shadow:0 0 30px rgba(0,242,255,.4);
background:#000;
}

.back{
margin-top:15px;
padding:8px 16px;
border:1px solid #00f2ff;
color:#00f2ff;
text-decoration:none;
}

.back:hover{
background:#00f2ff;
color:#000;
}

</style>
</head>

<body>

<h2>💎 GIẢI MÃ SAN HÔ</h2>

<canvas id="game"></canvas>

<a class="back" href="index.html">← Dream Ocean</a>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const ROWS=6
const COLS=8
const TILE=60

canvas.width=COLS*TILE
canvas.height=ROWS*TILE

let board=[]
let selected=null

const icons=["🐟","🐠","🐡","🦀","🐚","🪸","🦑","🐙"]

let pool=[]

for(let i=0;i<24;i++){
let ic=icons[i%8]
pool.push(ic,ic)
}

pool.sort(()=>Math.random()-0.5)

for(let r=0;r<ROWS;r++){
board[r]=[]
for(let c=0;c<COLS;c++){
board[r][c]=pool.pop()
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

for(let r=0;r<ROWS;r++){

for(let c=0;c<COLS;c++){

if(!board[r][c]) continue

ctx.strokeStyle="#00f2ff"
ctx.strokeRect(c*TILE,r*TILE,TILE,TILE)

ctx.fillStyle="#fff"

if(selected && selected.r===r && selected.c===c){
ctx.fillStyle="#00f2ff"
}

ctx.font="30px Arial"
ctx.fillText(board[r][c],c*TILE+15,r*TILE+40)

}

}

}

canvas.onclick=e=>{

let rect=canvas.getBoundingClientRect()

let c=Math.floor((e.clientX-rect.left)/TILE)
let r=Math.floor((e.clientY-rect.top)/TILE)

if(!board[r][c]) return

if(!selected){

selected={r,c}

}else{

if(board[r][c]===board[selected.r][selected.c] && (r!==selected.r||c!==selected.c)){

board[r][c]=null
board[selected.r][selected.c]=null

}

selected=null

}

draw()

}

draw()

</script>

</body>
</html>
