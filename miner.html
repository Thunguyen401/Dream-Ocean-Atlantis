<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đảo Vàng Atlantis</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#001a2c,#00050a);
color:#00f2ff;
font-family:Segoe UI;
text-align:center;
}

canvas{
border:2px solid #00f2ff;
margin-top:20px;
background:#000;
}

.back{
display:inline-block;
margin-top:10px;
padding:8px 16px;
border:1px solid #00f2ff;
color:#00f2ff;
text-decoration:none;
}

</style>
</head>

<body>

<h2>⛏ SĂN KHO BÁU</h2>

<canvas id="game" width="600" height="450"></canvas>

<br>

<a class="back" href="index.html">← Dream Ocean</a>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let hook={
x:300,
y:40,
angle:0,
len:50,
state:"swing",
speed:0.03
}

let gold=[]

for(let i=0;i<7;i++){

gold.push({

x:Math.random()*500+50,
y:Math.random()*200+200,
r:15

})

}

function update(){

ctx.clearRect(0,0,600,450)

if(hook.state==="swing"){

hook.angle+=hook.speed

if(Math.abs(hook.angle)>1.2) hook.speed*=-1

}

else if(hook.state==="shoot"){

hook.len+=6

if(hook.len>420) hook.state="back"

gold.forEach((g,i)=>{

let hx=300+Math.sin(hook.angle)*hook.len
let hy=40+Math.cos(hook.angle)*hook.len

if(Math.hypot(hx-g.x,hy-g.y)<g.r){

hook.state="back"
gold.splice(i,1)

}

})

}

else{

hook.len-=5

if(hook.len<=50) hook.state="swing"

}

ctx.strokeStyle="white"

ctx.beginPath()

ctx.moveTo(300,40)

ctx.lineTo(

300+Math.sin(hook.angle)*hook.len,
40+Math.cos(hook.angle)*hook.len

)

ctx.stroke()

gold.forEach(g=>{

ctx.fillStyle="gold"

ctx.beginPath()
ctx.arc(g.x,g.y,g.r,0,7)
ctx.fill()

})

requestAnimationFrame(update)

}

canvas.onclick=()=>{

if(hook.state==="swing") hook.state="shoot"

}

update()

</script>

</body>
</html>
