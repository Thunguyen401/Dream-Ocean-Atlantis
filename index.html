<!DOCTYPE html>

<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dream Ocean</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🌊 DREAM OCEAN</h1>

<div class="gold">
💰 Gold: <span id="gold">0</span>
</div>

</header>

<main>

<div class="box">

<h2>💎 Hành Lang Ký Ức</h2>

<div id="memory">
Hành trình đại dương bắt đầu.
</div>

<button onclick="addMemory()">Thêm ký ức</button>

</div>

<div class="box">

<h2>🎮 Săn Ngọc Trai</h2>

<canvas id="pearl-game"></canvas>

<div>Score: <span id="score">0</span></div>

</div>

<div class="box">

<h2>🎵 Nhạc Đại Dương</h2>

<select id="musicSelect">

<option value="music/song1.mp3">Bring me back style</option>
<option value="music/song2.mp3">Future ocean</option>

</select>

<button onclick="toggleMusic()">Play</button>

<audio id="bgMusic" loop></audio>

</div>

<div class="box">

<h2>🖼 Gallery</h2>

<img src="images/ocean.jpg">

</div>

<div class="box">

<h2>🕹 Trạm Điều Khiển</h2>

<button onclick="location.href='pikachu.html'">💎 Pikachu</button>

<button onclick="location.href='miner.html'">⛏ Đào vàng</button>

<button onclick="location.href='shooter.html'">🏹 Bắn cá</button>

</div>

<div class="box">

<h2>🗺 Bản đồ Atlantis</h2>

<div onclick="discover('Cung điện pha lê')">🏛 Cung điện pha lê</div>
<div onclick="discover('Rạn san hô')">🐠 Rạn san hô</div>
<div onclick="discover('Thành phố chìm')">⚓ Thành phố chìm</div>

</div>

</main>

<script src="main.js"></script>

</body>
</html>
